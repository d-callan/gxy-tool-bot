on:
  pull_request:
    types: [labeled]

concurrency:
  group: gxy-feedback
  cancel-in-progress: false

jobs:
  address-feedback:
    name: Address PR Feedback
    if: contains(github.event.pull_request.labels.*.name, 'address-feedback')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Post status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🔧 Addressing feedback — [view progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install git+https://github.com/d-callan/gxy-tool-bot.git
      - run: pip install "planemo>=0.75.43"
      - name: Remove address-feedback label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --remove-label "address-feedback" || true
      - name: Find tool directory
        id: find_tool_dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PR title format: "tool_dir: auto-generated tool wrapper (issue #N)"
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title' 2>/dev/null || echo "")
          TOOL_DIR=$(echo "$PR_TITLE" | cut -d':' -f1 | xargs)
          # Fallback: check for .tool-name in the PR branch
          if [ -z "$TOOL_DIR" ] && [ -f tools/*/.tool-name ]; then
            TOOL_DIR=$(cat tools/*/.tool-name 2>/dev/null | head -1)
          fi
          if [ -z "$TOOL_DIR" ]; then
            echo "Could not determine tool directory from PR title or .tool-name"
            exit 1
          fi
          echo "tool_dir=$TOOL_DIR" >> $GITHUB_OUTPUT
          echo "Found tool directory: $TOOL_DIR"
      - name: Address feedback
        id: address
        env:
          GXY_TOOL_BOT_API_KEY: ${{ secrets.GXY_TOOL_BOT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gxy-tool-bot address-feedback \
            --pr ${{ github.event.pull_request.number }} \
            --config .gxy-tool-bot.yml \
            --tool-dir tools/${{ steps.find_tool_dir.outputs.tool_dir }} \
            --actor ${{ github.event.sender.login }} \
            --commit-msg-path $GITHUB_WORKSPACE/.commit-msg
      - name: Format updated XML with planemo
        if: steps.address.outcome == 'success'
        run: |
          planemo format --recursive tools/${{ steps.find_tool_dir.outputs.tool_dir }}/
      - name: Commit and push changes
        if: steps.address.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "gxy-tool-bot"
          git config user.email "gxy-tool-bot@users.noreply.github.com"
          TOOL_DIR=${{ steps.find_tool_dir.outputs.tool_dir }}
          rm -f "tools/$TOOL_DIR/.tool-name"
          # Detect files that are gitignored (e.g. .tar test data)
          IGNORED_FILES=$(find "tools/$TOOL_DIR" -type f | git check-ignore --no-index --files-from=- 2>/dev/null || true)
          # Add everything that isn't ignored
          git add tools/$TOOL_DIR/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            # Use LLM-generated commit message if available, otherwise fallback
            if [ -f "$GITHUB_WORKSPACE/.commit-msg" ]; then
              COMMIT_MSG=$(cat "$GITHUB_WORKSPACE/.commit-msg")
            else
              COMMIT_MSG="Address feedback on PR #${{ github.event.pull_request.number }}"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi
          # Clean up intermediary file
          rm -f "$GITHUB_WORKSPACE/.commit-msg"
          # If some files were gitignored, post a comment for human review
          if [ -n "$IGNORED_FILES" ]; then
            IGNORED_MSG="⚠️ The following files were generated but are excluded by .gitignore and were NOT committed:\n\n"
            for f in $IGNORED_FILES; do
              IGNORED_MSG+=" - \`$f\`\n"
            done
            IGNORED_MSG+="\nThese files are needed for the tool tests. To include them, a maintainer can run \`git add -f\` for each file, or download them from the [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            gh pr comment ${{ github.event.pull_request.number }} --body "$(echo -e "$IGNORED_MSG")"
          fi
      - name: Upload gitignored files as artifacts
        if: steps.address.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gitignored-test-data
          path: |
            ${{ github.workspace }}/tools/${{ steps.find_tool_dir.outputs.tool_dir }}/test-data/*.tar
          if-no-files-found: ignore
      - name: Handle failure
        if: steps.address.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ Failed to address feedback. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
