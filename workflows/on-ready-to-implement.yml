on:
  issues:
    types: [labeled]

jobs:
  generate:
    if: |
      github.event.label.name == 'ready-to-implement' ||
      github.event.label.name == 'retry-generate'
    runs-on: ubuntu-latest
    # Note: if allowed_maintainers is configured, the CLI verifies
    # github.event.actor is in the list and exits with code 1 if not.
    steps:
      - uses: actions/checkout@v4
      - name: Post status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🔄 Tool generation started — [view progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install git+https://github.com/d-callan/gxy-tool-bot.git
      - name: Remove retry-generate and generation-failed labels
        if: github.event.label.name == 'retry-generate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "retry-generate" || true
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "generation-failed" || true
      - name: Generate tool files
        id: generate
        env:
          GXY_TOOL_BOT_API_KEY: ${{ secrets.GXY_TOOL_BOT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gxy-tool-bot generate \
            --issue ${{ github.event.issue.number }} \
            --config .gxy-tool-bot.yml \
            --output generated/ \
            --actor ${{ github.event.sender.login }}
      - name: Create branch and PR
        if: steps.generate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "gxy-tool-bot"
          git config user.email "gxy-tool-bot@users.noreply.github.com"
          TOOL_DIR=$(cat generated/.tool-name)
          BRANCH="tool-bot/issue-${{ github.event.issue.number }}"
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          mkdir -p "tools/$TOOL_DIR"
          cp -r generated/* "tools/$TOOL_DIR/"
          rm -rf generated/
          find "tools/$TOOL_DIR" -type f -exec git add {} +
          git commit -m "Generate tool for issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}"
          git push origin "$BRANCH"
          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "Tool: auto-generated (issue #${{ github.event.issue.number }})" \
            --body "Generated by gxy-tool-bot for issue #${{ github.event.issue.number }}"
          gh issue edit ${{ github.event.issue.number }} --add-label "pr-opened"
      - name: Handle generation failure
        if: steps.generate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "generation-failed"
