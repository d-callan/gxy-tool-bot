on:
  issues:
    types: [labeled]

jobs:
  generate:
    if: |
      github.event.label.name == 'ready-to-implement' ||
      github.event.label.name == 'retry-generate'
    runs-on: ubuntu-latest
    # Note: if allowed_maintainers is configured, the CLI verifies
    # github.event.actor is in the list and exits with code 1 if not.
    steps:
      - uses: actions/checkout@v4
      - name: Post status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🔄 Tool generation started — [view progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install git+https://github.com/d-callan/gxy-tool-bot.git
      - run: pip install "planemo>=0.75.43"
      - name: Remove retry-generate and generation-failed labels
        if: github.event.label.name == 'retry-generate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "retry-generate" || true
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "generation-failed" || true
      - name: Generate tool files
        id: generate
        env:
          GXY_TOOL_BOT_API_KEY: ${{ secrets.GXY_TOOL_BOT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gxy-tool-bot generate \
            --issue ${{ github.event.issue.number }} \
            --config .gxy-tool-bot.yml \
            --output generated/ \
            --actor ${{ github.event.sender.login }}
      - name: Format generated XML with planemo
        id: format
        if: steps.generate.outcome == 'success'
        run: |
          planemo format --recursive generated/
      - name: Create branch and PR
        id: create_pr
        if: steps.generate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "gxy-tool-bot"
          git config user.email "gxy-tool-bot@users.noreply.github.com"
          TOOL_DIR=$(cat generated/.tool-name)
          BRANCH="tool-bot/issue-${{ github.event.issue.number }}"
          git fetch origin main
          # Check if branch already exists (re-run scenario)
          if git ls-remote --exit-code --heads origin "$BRANCH" 2>/dev/null; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" origin/main
            REGEN=true
          else
            git checkout -b "$BRANCH" origin/main
            REGEN=false
          fi
          # Remove old tool files if they exist (clean overwrite)
          rm -rf "tools/$TOOL_DIR"
          mkdir -p "tools/$TOOL_DIR"
          cp -r generated/. "tools/$TOOL_DIR/"
          rm -rf generated/
          rm -f "tools/$TOOL_DIR/.tool-name"
          find "tools/$TOOL_DIR" -type f -exec git add {} +
          git commit -m "Generate tool for issue #${{ github.event.issue.number }}

          Closes #${{ github.event.issue.number }}"
          git push origin "$BRANCH" --force
          # Check if PR already exists for this branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "🔄 Tool regenerated — previous files overwritten. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            gh issue comment ${{ github.event.issue.number }} --body "🔄 Tool regenerated and PR #$PR_NUMBER updated — previous files overwritten."
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "$TOOL_DIR: auto-generated tool wrapper (issue #${{ github.event.issue.number }})" \
              --body "Generated by gxy-tool-bot for issue #${{ github.event.issue.number }}"
            gh issue comment ${{ github.event.issue.number }} --body "✅ Tool generated successfully and PR opened!"
          fi
          gh issue edit ${{ github.event.issue.number }} --add-label "pr-opened"
      - name: Handle generation failure
        if: steps.generate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "generation-failed"
      - name: Handle PR creation failure
        if: steps.create_pr.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ Files were generated but PR creation failed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Add the \`retry-generate\` label to try again."
          gh issue edit ${{ github.event.issue.number }} --add-label "generation-failed"
