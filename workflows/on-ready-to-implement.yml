on:
  issues:
    types: [labeled]

concurrency:
  group: gxy-generate
  cancel-in-progress: false

jobs:
  generate:
    if: |
      github.event.label.name == 'ready-to-implement' ||
      github.event.label.name == 'retry-generate'
    runs-on: ubuntu-latest
    # Note: if allowed_maintainers is configured, the CLI verifies
    # github.event.actor is in the list and exits with code 1 if not.
    steps:
      - uses: actions/checkout@v4
      - name: Post status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "🔄 Tool generation started — [view progress](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install git+https://github.com/d-callan/gxy-tool-bot.git
      - run: pip install "planemo>=0.75.43"
      - name: Remove retry-generate and generation-failed labels
        if: github.event.label.name == 'retry-generate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "retry-generate" || true
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "generation-failed" || true
      - name: Generate tool files
        id: generate
        env:
          GXY_TOOL_BOT_API_KEY: ${{ secrets.GXY_TOOL_BOT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gxy-tool-bot generate \
            --issue ${{ github.event.issue.number }} \
            --config .gxy-tool-bot.yml \
            --output generated/ \
            --actor ${{ github.event.sender.login }} \
            --commit-msg-path $GITHUB_WORKSPACE/.commit-msg \
            --pr-body-path $GITHUB_WORKSPACE/.pr-body
      - name: Format generated XML with planemo
        id: format
        if: steps.generate.outcome == 'success'
        run: |
          planemo format --recursive generated/
      - name: Create branch and PR
        id: create_pr
        if: steps.generate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "gxy-tool-bot"
          git config user.email "gxy-tool-bot@users.noreply.github.com"
          TOOL_DIR=$(cat generated/.tool-name)
          echo "tool_dir=$TOOL_DIR" >> $GITHUB_OUTPUT
          BRANCH="tool-bot/issue-${{ github.event.issue.number }}"
          git fetch origin main
          # Check if branch already exists (re-run scenario)
          if git ls-remote --exit-code --heads origin "$BRANCH" 2>/dev/null; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" origin/main
            REGEN=true
          else
            git checkout -b "$BRANCH" origin/main
            REGEN=false
          fi
          # Remove old tool files if they exist (clean overwrite)
          rm -rf "tools/$TOOL_DIR"
          mkdir -p "tools/$TOOL_DIR"
          cp -r generated/. "tools/$TOOL_DIR/"
          rm -rf generated/
          rm -f "tools/$TOOL_DIR/.tool-name"
          # Detect files that are gitignored (e.g. .tar test data)
          IGNORED_FILES=$(find "tools/$TOOL_DIR" -type f | git check-ignore --no-index --files-from=- 2>/dev/null || true)
          # Add everything that isn't ignored
          git add "tools/$TOOL_DIR/" || true
          # Use LLM-generated commit message if available, otherwise fallback
          if [ -f "$GITHUB_WORKSPACE/.commit-msg" ]; then
            COMMIT_MSG=$(cat "$GITHUB_WORKSPACE/.commit-msg")
          else
            COMMIT_MSG=$(printf "Generate tool for issue #%s\n\nCloses #%s" "${{ github.event.issue.number }}" "${{ github.event.issue.number }}")
          fi
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force
          # Check if PR already exists for this branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "🔄 Tool regenerated — previous files overwritten. [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            gh issue comment ${{ github.event.issue.number }} --body "🔄 Tool regenerated and PR #$PR_NUMBER updated — previous files overwritten."
          else
            # PR title format: "tool_dir: auto-generated tool wrapper (issue #N)"
            # The address-feedback workflow parses this title (cut -d':' -f1) to find
            # the tool directory. If this title format changes, the feedback loop
            # will break unless the tool-dir detection logic is also updated.
            # Use LLM-generated PR body if available, otherwise fallback
            if [ -f "$GITHUB_WORKSPACE/.pr-body" ]; then
              PR_BODY=$(cat "$GITHUB_WORKSPACE/.pr-body")
            else
              PR_BODY="Generated by gxy-tool-bot for issue #${{ github.event.issue.number }}"
            fi
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "$TOOL_DIR: auto-generated tool wrapper (issue #${{ github.event.issue.number }})" \
              --body "$PR_BODY"
            gh issue comment ${{ github.event.issue.number }} --body "✅ Tool generated successfully and PR opened!"
          fi
          # If some files were gitignored, post a comment for human review
          if [ -n "$IGNORED_FILES" ]; then
            IGNORED_MSG="⚠️ The following files were generated but are excluded by .gitignore and were NOT committed:\n\n"
            for f in $IGNORED_FILES; do
              IGNORED_MSG+=" - \`$f\`\n"
            done
            IGNORED_MSG+="\nThese files are needed for the tool tests. To include them, a maintainer can run \`git add -f\` for each file, or download them from the [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            gh pr comment "$PR_NUMBER" --body "$(echo -e "$IGNORED_MSG")"
          fi
          gh issue edit ${{ github.event.issue.number }} --add-label "pr-opened"
          # Clean up intermediary files
          rm -f "$GITHUB_WORKSPACE/.commit-msg" "$GITHUB_WORKSPACE/.pr-body"
      - name: Upload gitignored files as artifacts
        if: steps.create_pr.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gitignored-test-data
          path: |
            ${{ github.workspace }}/tools/${{ steps.create_pr.outputs.tool_dir }}/test-data/*.tar
          if-no-files-found: ignore
      - name: Handle generation failure
        if: steps.generate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ Tool generation failed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Add the \`retry-generate\` label to try again."
          gh issue edit ${{ github.event.issue.number }} --add-label "generation-failed"
      - name: Handle PR creation failure
        if: steps.create_pr.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ Files were generated but PR creation failed. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details. Add the \`retry-generate\` label to try again."
          gh issue edit ${{ github.event.issue.number }} --add-label "generation-failed"
