name: Tool Request
description: Request a new Galaxy tool wrapper to be generated
labels: ["tool-request"]
body:
  - type: markdown
    attributes:
      value: |
        Fill out this form to request a new Galaxy tool wrapper.
        The bot will research the tool and post a plan as a comment.
        A maintainer will then review and approve it for generation.
  - type: input
    id: tool-name
    attributes:
      label: Tool name
      description: Name of the bioinformatics tool (e.g. samtools sort)
      placeholder: e.g. samtools sort
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should the tool do? What are the key inputs and outputs?
      placeholder: Sort BAM files by coordinate or read name...
    validations:
      required: true
  - type: textarea
    id: links
    attributes:
      label: Links
      description: Relevant URLs — GitHub repo, Bioconda page, DOI/publication, documentation
      placeholder: |
        https://github.com/samtools/samtools
        https://doi.org/10.1093/bioinformatics/btp352
        https://bioconda.github.io/recipes/samtools/README.html
    validations:
      required: false
  - type: input
    id: contact
    attributes:
      label: Contact
      description: GitHub handle for follow-up questions (optional)
      placeholder: "@your-github-handle"
    validations:
      required: false
